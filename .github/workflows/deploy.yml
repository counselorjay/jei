name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Stage parent-workspace data for build
        # src/pages/index.astro imports "../../../output/jei_metrics.json"
        # which resolves outside the repo. Stage the committed copy at the
        # expected relative location for CI builds.
        run: |
          mkdir -p ../output
          cp ci-data/jei_metrics.json ../output/jei_metrics.json

      - name: Build
        # Skip the prebuild step (build-widget-data.mjs); it depends on the
        # full corpus JSONL which is not in the repo. The generated
        # src/data/jei_widget_data.json is committed and refreshed locally.
        run: npx astro build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=jei --branch=main
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
